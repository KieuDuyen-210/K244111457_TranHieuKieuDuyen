<html>
    <head>
        <title> EX55 </title>
        <script>
            function solution() {
                var a = parseFloat(quadratic_equation.a.value);
                var b = parseFloat(quadratic_equation.b.value);
                var c = parseFloat(quadratic_equation.c.value);
                
                if (a == 0) {
                    if (b == 0) {
                        document.getElementById("result").value = "No solution";
                    } else {
                        var x = -c / b;
                        document.getElementById("result").value = " x = " + x;
                    }
                } else {
                    var delta = b * b - 4 * a * c;
                    if (delta < 0) {
                        document.getElementById("result").value = "No real solution";
                    } else if (delta == 0) {
                        var x = -b / (2 * a);
                        document.getElementById("result").value = "One solution: x = " + x;
                    } else {
                        var x1 = (-b + Math.sqrt(delta)) / (2 * a);
                        var x2 = (-b - Math.sqrt(delta)) / (2 * a);
                        document.getElementById("result").value = "x1 = " + x1 + "; x2 = " + x2;
                    }
                }
            }

            function reset() {
                document.getElementById("result").value = "";
                quadratic_equation.a.value = "";
                quadratic_equation.b.value = "";
                quadratic_equation.c.value = "";
            }
        </script>
    </head>
    <body>
        <form name="quadratic_equation">
            <table border="1">
                <tr>
                    <td>a:</td>
                    <td><input type="number" name="a"></td>
                </tr>
                <tr>
                    <td>b:</td>
                    <td><input type="number" name="b"></td>
                </tr>
                <tr>
                    <td>c:</td>
                    <td><input type="number" name="c"></td>
                </tr>
                <tr>
                    <td>Result:</td>
                    <td><input type="text" name="result" id="result" readonly></td>
                </tr>
                <tr>
                    <td></td>
                    <td><button type="button" onclick="solution()">Find Solution</button> <button type="button" onclick="reset()">Clear</button></td>
                </tr>
            </table>
        </form>
    </body>
</html>
