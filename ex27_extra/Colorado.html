<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colorado Experience</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: "Times New Roman", Times, serif;
            background-image: url('images/Wall2.jpg');
            overflow: hidden;
        }


        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 3px solid blue;
            box-sizing: border-box;
        }

  
        .header {
            height: 100px; 
            border-bottom: 3px solid blue; 
            background-color: white; 
        }

        .header img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

    
        .content-wrapper {
            display: flex;
            flex: 1; 
            overflow: hidden;
        }

   
        .sidebar {
            width: 20%; 
            border-right: 3px solid blue;
            padding: 15px;
            overflow-y: auto; 
        }


        .sidebar a {
            display: block;
            color: purple;
            text-decoration: underline;
            font-weight: bold;
            font-family: Arial, sans-serif;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .sidebar a:hover {
            color: blue;
        }


        .sidebar .submenu {
            margin-left: 20px;
        }

        .sidebar .menu-title {
            color: purple;
            text-decoration: underline;
            font-weight: bold;
            font-family: Arial, sans-serif;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .main-content {
            width: 80%; 
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="images/LOGO.JPG" alt="The Colorado Experience">
        </div>

        <div class="content-wrapper">
            
            <div class="sidebar">
                <a href="TCE.html" target="main_iframe">Home Page</a>
                <a href="Philosph.html" target="main_iframe">Our Philosophy</a>
                <a href="Lessons.html" target="main_iframe">Climbing Lessons</a>
                
                <div class="menu-title">Tours</div>
                <div class="submenu">
                    <a href="Grepon.html" target="main_iframe">Petit Grepon</a>
                    <a href="Lumpy.html" target="main_iframe">Lumpy Ridge</a>
                    <a href="NFace.html" target="main_iframe">North Face</a>
                    <a href="Kieners.html" target="main_iframe">Kiener's</a>
                    <a href="Diamond.html" target="main_iframe">The Diamond</a>
                    <a href="Eldorado.html" target="main_iframe">Eldorado</a>
                </div>
                
                <a href="Staff.html" target="main_iframe">Staff</a>
            </div>

            <div class="main-content">
                <iframe src="TCE.html" name="main_iframe" title="Content Area"></iframe>
            </div>

        </div>
    </div>

</body>
</html>
